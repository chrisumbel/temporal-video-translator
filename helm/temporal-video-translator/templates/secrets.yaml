# All chart secrets. Values come from the gitignored chart-root secrets.yaml
# passed at install time (helm -f secrets.yaml); values.yaml holds empty
# placeholders only.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.name }}-azure
  labels:
    {{- include "temporal-video-translator.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Service principal for DefaultAzureCredential (EnvironmentCredential path)
  AZURE_CLIENT_ID: {{ .Values.secrets.azureClientId | quote }}
  AZURE_TENANT_ID: {{ .Values.secrets.azureTenantId | quote }}
  AZURE_CLIENT_SECRET: {{ .Values.secrets.azureClientSecret | quote }}
  AZURE_SUBSCRIPTION_ID: {{ .Values.secrets.azureSubscriptionId | quote }}
  VIDEO_INDEXER_ACCOUNT_ID: {{ .Values.secrets.videoIndexerAccountId | quote }}
  # required by the workflow's validate step to accept a run
  API_KEY: {{ .Values.secrets.apiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.app.name }}-postgres
  labels:
    {{- include "temporal-video-translator.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | quote }}
